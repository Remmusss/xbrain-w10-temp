apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w10-lab-rbac
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Remmusss/xbrain-w10-temp.git
    targetRevision: main
    path: rbac
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

