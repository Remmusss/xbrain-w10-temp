apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eso-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    w10.argocd/reconcile: "2026-06-18T09:06:00Z"
spec:
  project: default
  source:
    repoURL: https://github.com/Remmusss/xbrain-w10-temp.git
    targetRevision: main
    path: eso
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
