apiVersion: apps/v1
kind: Deployment
metadata:
  name: good-owner-label
  namespace: demo
  labels:
    app: good-owner-label
    owner: team-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: good-owner-label
  template:
    metadata:
      labels:
        app: good-owner-label
        owner: team-platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: app
          image: nginx:1.27.0
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
